{% extends "base.html" %}

{% block content %}

<div class="container-box">

    <h2>Edit Book</h2>

    <form method="POST">
        
        <input type="text" name="title" value="{{ book.title }}" class="form-control mb-3">
        <input type="text" name="author" value="{{ book.author }}" class="form-control mb-3">
        <input type="number" name="price" value="{{ book.price }}" class="form-control mb-3">

        <!-- ⭐ ADD THIS -->
        <label>Rating</label>
        <select name="rating" class="form-control mb-3">
            {% for i in range(1,6) %}
                <option value="{{ i }}" 
                    {% if book.rating == i %}selected{% endif %}>
                    {{ "⭐" * i }}
                </option>
            {% endfor %}
        </select>

        <button class="btn btn-success">Update</button>
        <a href="/" class="btn btn-secondary">Back</a>

    </form>

</div>

{% endblock %}
