{% extends "base.html" %}

{% block content %}

<div class="container-box">

    <h2 class="mb-4">➕ Add New Book</h2>

    <form method="POST">

        <input type="text" name="title" class="form-control mb-3" placeholder="Title" required>

        <input type="text" name="author" class="form-control mb-3" placeholder="Author" required>

        <!-- 💰 PRICE (ADD THIS) -->
        <input type="number" name="price" class="form-control mb-3" placeholder="Price" required>

        <!-- ⭐ RATING -->
        <label>Rating</label>
        <select name="rating" class="form-control mb-3">
            <option value="1">⭐ 1</option>
            <option value="2">⭐⭐ 2</option>
            <option value="3">⭐⭐⭐ 3</option>
            <option value="4">⭐⭐⭐⭐ 4</option>
            <option value="5">⭐⭐⭐⭐⭐ 5</option>
        </select>

        <button class="btn btn-success">Add Book</button>
        <a href="/" class="btn btn-secondary">Back</a>

    </form>
</div>

{% endblock %}
