<h2>Forgot Password</h2>

<form method="POST">
    <input type="text" name="username" placeholder="Enter username" required>
    <button type="submit">Get Reset Link</button>
</form>

{% if message %}
<p>🔗 Reset Link:</p>
<a href="{{ message }}">{{ message }}</a>
{% endif %}

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
