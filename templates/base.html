<!DOCTYPE html>
<html>
<head>
    <title>Book Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar shadow">
    <div class="container d-flex justify-content-between align-items-center">

        <!-- Left side -->
        <span class="navbar-brand fw-bold fs-3 text-white">
           📚 Library Management System
        </span>

        <!-- Right side -->
        <div class="d-flex align-items-center gap-3">

            <!-- Theme button -->
            <button id="themeToggle" class="btn btn-light btn-sm"> 🌙 </button>

            <!-- User section -->
            {% if session.get('user') %}
                <span class="text-white">
                    Welcome, {{ session['user'] }}
                </span>

                <a href="/account" class="btn btn-outline-light btn-sm"> Account </a>
                <a href="/logout" class="btn btn-danger btn-sm"> Logout </a>
                <a href="/my-books" class="btn btn-outline-light btn-sm"> My Books </a>

            {% if session.get('role') == 'admin' %}
                <a href="/admin">👑 Admin</a>
            {% endif %}

            {% else %}
                <a href="/login" class="btn btn-light btn-sm"> Login </a>
            {% endif %}

        </div>
    </div>
</nav>

<!-- Dynamic content -->
<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
